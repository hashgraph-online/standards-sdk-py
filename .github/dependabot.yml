version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/standards-sdk-py"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
  - package-ecosystem: "github-actions"
    directory: "/standards-sdk-py/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
