name: standards-sdk-py-security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "21 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}

  static-and-vuln-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pip-audit
        run: pip-audit --progress-spinner off --format json --output pip-audit.json .
      - name: Run Bandit SAST
        run: bandit -q -r src --severity-level medium --confidence-level medium -f json -o bandit.json
      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: standards-sdk-py-pip-audit
          path: pip-audit.json
          if-no-files-found: error
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: standards-sdk-py-bandit
          path: bandit.json
          if-no-files-found: error
      - name: Secret scan (TruffleHog)
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified
