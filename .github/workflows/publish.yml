name: standards-sdk-py-publish

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Target repository"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "standards-sdk-py-v*"

permissions:
  contents: read

concurrency:
  group: standards-sdk-py-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  HOL_SDK_DOCS_URL: https://hol.org/docs/libraries/standards-sdk/

jobs:
  build:
    name: Build + Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine
      - name: Validate quality gates
        run: |
          ruff check .
          black --check .
          mypy src
          pytest -m "not integration"
          standards-sdk-py-check-parity
      - name: Validate canonical docs metadata
        run: |
          python - <<'PY'
          import json
          import pathlib
          import tomllib

          docs_url = "https://hol.org/docs/libraries/standards-sdk/"
          libraries_url = "https://libraries.io/pypi/standards-sdk-py"
          readme = pathlib.Path("README.md").read_text(encoding="utf-8")
          if docs_url not in readme:
              raise SystemExit(f"README.md must include canonical docs URL: {docs_url}")
          if libraries_url not in readme:
              raise SystemExit(f"README.md must include Libraries.io URL: {libraries_url}")
          if "https://pypistats.org/packages/standards-sdk-py" not in readme:
              raise SystemExit("README.md must include a live PyPI downloads link.")

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          urls = pyproject.get("project", {}).get("urls", {})
          for field in ("Homepage", "Documentation"):
              if urls.get(field) != docs_url:
                  raise SystemExit(
                      f"pyproject.toml [project.urls].{field} must equal {docs_url}; got {urls.get(field)!r}"
                  )
          if urls.get("Libraries") != libraries_url:
              raise SystemExit(
                  f"pyproject.toml [project.urls].Libraries must equal {libraries_url}; got {urls.get('Libraries')!r}"
              )

          citation = pathlib.Path("CITATION.cff")
          if not citation.exists():
              raise SystemExit("CITATION.cff is required for archival and citation metadata.")
          zenodo = pathlib.Path(".zenodo.json")
          if not zenodo.exists():
              raise SystemExit(".zenodo.json is required for Zenodo metadata.")
          json.loads(zenodo.read_text(encoding="utf-8"))

          print("Canonical docs metadata verified.")
          PY
      - name: Build package
        run: python -m build
      - name: Validate package metadata
        run: twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: standards-sdk-py-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish_target == 'testpypi' || github.event.inputs.publish_target == 'pypi'
    runs-on: ubuntu-latest
    environment: testpypi
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: standards-sdk-py-dist
          path: dist
      - name: Publish package distributions to TestPyPI (API token)
        if: env.TEST_PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          password: ${{ env.TEST_PYPI_API_TOKEN }}
          verbose: true
      - name: Publish package distributions to TestPyPI (Trusted Publisher)
        if: env.TEST_PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs:
      - build
      - publish-testpypi
    if: (github.event_name == 'push' && !contains(github.ref_name, '-rc')) || github.event.inputs.publish_target == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: standards-sdk-py-dist
          path: dist
      - name: Publish package distributions to PyPI (API token)
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ env.PYPI_API_TOKEN }}
          verbose: true
      - name: Publish package distributions to PyPI (Trusted Publisher)
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true

  attest:
    name: Attest Build Provenance
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: standards-sdk-py-dist
          path: dist
      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

  github-release:
    name: GitHub Release
    needs: publish-pypi
    if: github.event_name == 'push' || (startsWith(github.ref, 'refs/tags/standards-sdk-py-v') && github.event.inputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Ensure GitHub release includes canonical docs URL
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          docs_line="- Standards SDK docs: ${HOL_SDK_DOCS_URL}"
          release_notes="$(printf '## Documentation\n%s\n' "${docs_line}")"

          if ! gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --repo "${GH_REPO}" \
              --title "${tag}" \
              --generate-notes \
              --notes "${release_notes}"
            exit 0
          fi

          body="$(gh release view "${tag}" --repo "${GH_REPO}" --json body --jq '.body // ""')"
          if printf '%s' "${body}" | grep -Fq "${HOL_SDK_DOCS_URL}"; then
            echo "Release ${tag} already contains canonical docs URL."
            exit 0
          fi

          notes_file="$(mktemp)"
          {
            printf '%s\n' "${body}"
            printf '\n%s' "${release_notes}"
          } > "${notes_file}"
          gh release edit "${tag}" --repo "${GH_REPO}" --notes-file "${notes_file}"
          rm -f "${notes_file}"

  ecosystem-indexing:
    name: Ecosystem Indexing + Archive Signals
    needs: publish-pypi
    if: github.event_name == 'push' || github.event.inputs.publish_target == 'pypi'
    runs-on: ubuntu-latest
    steps:
      - name: Verify PyPI and Libraries.io indexing
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          tag_prefix = "standards-sdk-py-v"
          expected_version = ref_name[len(tag_prefix):] if ref_name.startswith(tag_prefix) else None
          project_url = "https://pypi.org/project/standards-sdk-py/"
          pypi_json_url = "https://pypi.org/pypi/standards-sdk-py/json"
          libraries_url = "https://libraries.io/pypi/standards-sdk-py"

          def wait_for_index(url: str) -> None:
              for attempt in range(1, 11):
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={"User-Agent": "standards-sdk-py-publish-check"},
                      )
                      with urllib.request.urlopen(request, timeout=20) as response:
                          if 200 <= response.status < 400:
                              print(f"Indexed: {url}")
                              return
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404 and attempt < 10:
                          time.sleep(30)
                          continue
                      raise
                  except urllib.error.URLError:
                      if attempt < 10:
                          time.sleep(30)
                          continue
                      raise
              raise RuntimeError(f"Timed out waiting for index: {url}")

          def wait_for_pypi_version(url: str, version: str | None) -> None:
              for attempt in range(1, 11):
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={"User-Agent": "standards-sdk-py-publish-check"},
                      )
                      with urllib.request.urlopen(request, timeout=20) as response:
                          payload = json.loads(response.read().decode("utf-8"))
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404 and attempt < 10:
                          time.sleep(30)
                          continue
                      raise
                  except urllib.error.URLError:
                      if attempt < 10:
                          time.sleep(30)
                          continue
                      raise

                  indexed_version = payload.get("info", {}).get("version")
                  if version is None or indexed_version == version:
                      print(f"PyPI indexed version: {indexed_version}")
                      return
                  if attempt < 10:
                      time.sleep(30)
                      continue
                  raise RuntimeError(
                      f"Timed out waiting for PyPI version {version}; last observed {indexed_version}"
                  )

          wait_for_index(project_url)
          wait_for_pypi_version(pypi_json_url, expected_version)
          wait_for_index(libraries_url)

          print("PyPI + Libraries.io indexing verified.")
          PY
      - name: Trigger Software Heritage archival save request
        run: |
          python - <<'PY'
          import json
          import urllib.request

          endpoint = (
              "https://archive.softwareheritage.org/api/1/origin/save/git/url/"
              "https://github.com/hashgraph-online/standards-sdk-py/"
          )

          request = urllib.request.Request(
              endpoint,
              method="POST",
              headers={"User-Agent": "standards-sdk-py-release-workflow"},
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          print(f"Software Heritage save request accepted: id={payload.get('id')}")
          print(f"Status: {payload.get('save_request_status')}")
          PY
