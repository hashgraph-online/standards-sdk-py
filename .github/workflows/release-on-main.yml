name: standards-sdk-py-release-on-main

on:
  push:
    branches:
      - main
      - master

permissions:
  actions: write
  contents: write

concurrency:
  group: standards-sdk-py-release-on-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip release for auto-generated bump commit
        id: gate
        run: |
          set -euo pipefail
          commit_message="${{ github.event.head_commit.message }}"
          if [[ "${commit_message}" == chore\(release\):\ bump\ version\ to\ * ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Auto-generated bump commit detected; skipping."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Bump package patch version
        id: version
        if: steps.gate.outputs.skip != 'true'
        run: |
          python3 - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          pyproject_text = pyproject_path.read_text(encoding="utf-8")
          pyproject = tomllib.loads(pyproject_text)
          old_version = pyproject["project"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", old_version)
          if not match:
              raise SystemExit(f"Version must be strict semver (x.y.z), got: {old_version}")

          major, minor, patch = (int(group) for group in match.groups())
          new_version = f"{major}.{minor}.{patch + 1}"
          pyproject_text = pyproject_text.replace(
              f'version = "{old_version}"',
              f'version = "{new_version}"',
              1,
          )
          pyproject_path.write_text(pyproject_text, encoding="utf-8")

          uv_lock_path = Path("uv.lock")
          uv_lock_text = uv_lock_path.read_text(encoding="utf-8")
          uv_lock_text = re.sub(
              rf'(\nversion = "){re.escape(old_version)}(")',
              rf'\g<1>{new_version}\2',
              uv_lock_text,
              count=1,
          )
          uv_lock_text = re.sub(
              rf'(\nname = "standards-sdk-py"\nversion = "){re.escape(old_version)}(")',
              rf'\g<1>{new_version}\2',
              uv_lock_text,
              count=1,
          )
          uv_lock_path.write_text(uv_lock_text, encoding="utf-8")

          meta_path = Path("conda-recipe/meta.yaml")
          meta_text = meta_path.read_text(encoding="utf-8")
          meta_text = re.sub(
              r'(\{\% set version = environ.get\("PKG_VERSION"\) or ")([^"]+)("\s*\%\})',
              rf'\g<1>{new_version}\3',
              meta_text,
              count=1,
          )
          meta_path.write_text(meta_text, encoding="utf-8")

          print(new_version)
          PY

          version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(pyproject["project"]["version"])
          PY
          )"
          tag="standards-sdk-py-v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock conda-recipe/meta.yaml
          git commit -m "chore(release): bump version to ${version} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create and push release tag when missing
        id: tag
        if: steps.gate.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists; no new release tag created."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created release tag ${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"
      - name: Dispatch publish workflows for new tag
        id: dispatch
        if: steps.gate.outputs.skip != 'true' && steps.tag.outputs.created == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const releaseTag = process.env.RELEASE_TAG;
            const dispatchedAt = new Date().toISOString();
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "publish.yml",
              ref: releaseTag,
              inputs: { publish_target: "pypi" },
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "conda-publish.yml",
              ref: releaseTag,
            });
            core.info(`Triggered publish.yml and conda-publish.yml for ${releaseTag}`);
            core.setOutput("release_tag", releaseTag);
            core.setOutput("dispatched_at", dispatchedAt);
      - name: Wait for publish workflows
        if: steps.dispatch.outputs.release_tag != ''
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.dispatch.outputs.release_tag }}
          DISPATCHED_AT: ${{ steps.dispatch.outputs.dispatched_at }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseTag = process.env.RELEASE_TAG;
            const dispatchedAt = Date.parse(process.env.DISPATCHED_AT ?? '');
            const pollDelayMs = 15000;
            const maxAttempts = 60;
            const workflows = [
              { id: 'publish.yml', name: 'standards-sdk-py-publish' },
              { id: 'conda-publish.yml', name: 'standards-sdk-py-conda-publish' },
            ];

            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            async function waitForWorkflow({ id, name }) {
              for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: id,
                  branch: releaseTag,
                  event: 'workflow_dispatch',
                  per_page: 10,
                });

                const run = data.workflow_runs.find(candidate => {
                  const createdAt = Date.parse(candidate.created_at);
                  return Number.isFinite(createdAt) && createdAt >= dispatchedAt - 5000;
                });

                if (run) {
                  core.info(
                    `${name} run ${run.id} status=${run.status} conclusion=${run.conclusion ?? 'n/a'}`,
                  );
                  if (run.status === 'completed') {
                    if (run.conclusion !== 'success') {
                      core.setFailed(
                        `${name} failed for ${releaseTag}: ${run.html_url}`,
                      );
                    }
                    return;
                  }
                } else {
                  core.info(`${name} has not started yet for ${releaseTag} (attempt ${attempt}/${maxAttempts})`);
                }

                await sleep(pollDelayMs);
              }

              core.setFailed(`Timed out waiting for ${name} to finish for ${releaseTag}.`);
            }

            for (const workflow of workflows) {
              await waitForWorkflow(workflow);
            }
