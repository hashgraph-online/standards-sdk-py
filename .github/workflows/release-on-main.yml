name: standards-sdk-py-release-on-main

on:
  push:
    branches:
      - main
      - master

permissions:
  actions: write
  contents: write

concurrency:
  group: standards-sdk-py-release-on-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve package version
        id: version
        run: |
          version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(pyproject["project"]["version"])
          PY
          )"
          tag="standards-sdk-py-v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create and push release tag when missing
        id: tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists; no new release tag created."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created release tag ${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"
      - name: Dispatch publish workflows for new tag
        if: steps.tag.outputs.created == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const releaseTag = process.env.RELEASE_TAG;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "publish.yml",
              ref: releaseTag,
              inputs: { publish_target: "pypi" },
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "conda-publish.yml",
              ref: releaseTag,
            });
            core.info(`Triggered publish.yml and conda-publish.yml for ${releaseTag}`);
